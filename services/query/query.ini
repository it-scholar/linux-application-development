# Query Service Configuration

# Database path (from aggregation service)
database_path = /data/aggregated.db

# HTTP server bind address
bind_address = 0.0.0.0

# HTTP server port
port = 8080

# Log file (empty for stdout)
log_file = query.log

# Log level: debug, info, warn, error
log_level = info

# Daemon mode: true or false
daemon_mode = false
