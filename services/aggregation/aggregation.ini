# Aggregation Service Configuration

# Input database (from ingestion service)
input_database = weather.db

# Output database (aggregated data)
output_database = aggregated.db

# How often to run aggregation (seconds)
aggregation_interval_seconds = 300

# Log file (empty for stdout)
log_file = aggregation.log

# Log level: debug, info, warn, error
log_level = info

# Daemon mode: true or false
daemon_mode = false
