# Discovery Service Configuration

# Unique node identifier
node_id = discovery-node-1

# UDP bind address
bind_address = 0.0.0.0

# UDP discovery port
discovery_port = 9000

# Log file (empty for stdout)
log_file = discovery.log

# Log level: debug, info, warn, error
log_level = info

# Daemon mode: true or false
daemon_mode = false

# Leader election timeout (milliseconds)
election_timeout_ms = 5000

# Heartbeat interval (milliseconds)
heartbeat_interval_ms = 1000

# Known cluster nodes (format: id:address:port)
# Uncomment and configure for static cluster setup
# cluster_node = node-2:192.168.1.101:9000
# cluster_node = node-3:192.168.1.102:9000
