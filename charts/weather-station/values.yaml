# Default values for weather-station.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

nameOverride: ""
fullnameOverride: ""

namespace:
  create: true
  name: weather-station

# Global configuration
global:
  imagePullSecrets: []
  storageClass: ""

# Monitoring configuration
monitoring:
  enabled: false
  interval: 30s

# Ingestion Service
ingestion:
  enabled: true
  replicaCount: 1
  image:
    repository: weather-station-ingestion
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 1Gi
  config:
    database_path: /data/weather.db
    csv_directory: /data/csv
    poll_interval_seconds: 60
    log_level: info
  probes:
    liveness:
      enabled: true
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      enabled: true
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 3

# Aggregation Service
aggregation:
  enabled: true
  replicaCount: 1
  image:
    repository: weather-station-aggregation
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 1Gi
  config:
    input_database: /data/input.db
    output_database: /data/aggregated.db
    aggregation_interval_seconds: 300
    log_level: info
  probes:
    liveness:
      enabled: true
      initialDelaySeconds: 15
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      enabled: true
      initialDelaySeconds: 10
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 3
  initContainers:
    enabled: true
    waitForIngestion: true

# Query Service
query:
  enabled: true
  replicaCount: 1
  image:
    repository: weather-station-query
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 1Gi
  config:
    database_path: /data/aggregated.db
    bind_address: 0.0.0.0
    port: 8080
    log_level: info
  probes:
    liveness:
      enabled: true
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
      path: /health
      port: 8080
    readiness:
      enabled: true
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 3
      path: /health
      port: 8080
  initContainers:
    enabled: true
    waitForAggregation: true

# Discovery Service
discovery:
  enabled: true
  replicaCount: 1
  image:
    repository: weather-station-discovery
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 9000
    protocol: UDP
  config:
    node_id: ""
    bind_address: 0.0.0.0
    discovery_port: 9000
    election_timeout_ms: 5000
    heartbeat_interval_ms: 1000
    log_level: info
    # Peer endpoints for cross-namespace/cross-cluster communication
    # Format: peer_endpoint = fqdn:port:node_id
    # Example:
    # peer_endpoints:
    #   - "weather-station-2-query.station2.svc.cluster.local:8080:station2"
    #   - "weather-station-3-query.station3.svc.cluster.local:8080:station3"
    peer_endpoints: []
  probes:
    liveness:
      enabled: false
    readiness:
      enabled: false

# Service Account
serviceAccount:
  create: true
  annotations: {}
  name: ""
