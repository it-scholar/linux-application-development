name: Build and Publish Service Images

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
    paths:
      - 'services/**'
      - '.github/workflows/build-services.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'services/**'
      - '.github/workflows/build-services.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/weather-station

jobs:
  build-shared-lib:
    name: Build Shared Library
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build shared library
      working-directory: services/shared
      run: make clean && make

    - name: Upload shared library artifact
      uses: actions/upload-artifact@v4
      with:
        name: shared-library
        path: services/shared/lib/
        retention-days: 1

  build-ingestion:
    name: Build Ingestion Service
    runs-on: ubuntu-latest
    needs: build-shared-lib
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4

    - name: Download shared library
      uses: actions/download-artifact@v4
      with:
        name: shared-library
        path: services/shared/lib/

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-ingestion
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=sha,prefix=,suffix=,format=short
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

    - name: Build and push image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: services/ingestion/Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64

  build-aggregation:
    name: Build Aggregation Service
    runs-on: ubuntu-latest
    needs: build-shared-lib
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4

    - name: Download shared library
      uses: actions/download-artifact@v4
      with:
        name: shared-library
        path: services/shared/lib/

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-aggregation
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=sha,prefix=,suffix=,format=short
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

    - name: Build and push image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: services/aggregation/Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64

  build-query:
    name: Build Query Service
    runs-on: ubuntu-latest
    needs: build-shared-lib
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4

    - name: Download shared library
      uses: actions/download-artifact@v4
      with:
        name: shared-library
        path: services/shared/lib/

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-query
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=sha,prefix=,suffix=,format=short
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

    - name: Build and push image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: services/query/Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64

  build-discovery:
    name: Build Discovery Service
    runs-on: ubuntu-latest
    needs: build-shared-lib
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4

    - name: Download shared library
      uses: actions/download-artifact@v4
      with:
        name: shared-library
        path: services/shared/lib/

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-discovery
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=sha,prefix=,suffix=,format=short
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

    - name: Build and push image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: services/discovery/Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64

  update-helm-charts:
    name: Update Helm Charts
    runs-on: ubuntu-latest
    needs: [build-ingestion, build-aggregation, build-query, build-discovery]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Update image tags in Helm values
      run: |
        SHORT_SHA=$(git rev-parse --short HEAD)
        sed -i "s/tag: latest/tag: ${SHORT_SHA}/g" charts/weather-station/values.yaml
        
    - name: Commit changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add charts/weather-station/values.yaml
        git diff --quiet && git diff --staged --quiet || git commit -m "ci: update image tags to ${SHORT_SHA}"
        
    - name: Push changes
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        branch: ${{ github.ref }}

  notify:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs: [build-ingestion, build-aggregation, build-query, build-discovery]
    if: always() && github.ref == 'refs/heads/main'
    steps:
    - name: Notify Slack
      if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        channel: '#builds'
        fields: repo,message,commit,author,action,eventName,ref,workflow
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
